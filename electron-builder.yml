appId: com.orchebary.app
productName: Orchebary
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
# Native binaries must live outside the asar to be dlopen-able/executable.
asarUnpack:
  - resources/**
  - '**/*.node'
  - 'node_modules/node-pty/prebuilds/**'
  - 'node_modules/node-pty/build/Release/spawn-helper'
# Shipped zsh shim, resolved via process.resourcesPath in packaged builds.
extraResources:
  - from: resources/shell-integration
    to: shell-integration
mac:
  target:
    - dmg
    - zip
  entitlementsInherit: build/entitlements.mac.plist
  notarize: false
dmg:
  artifactName: ${name}-${version}.${ext}
win:
  executableName: orchebary
linux:
  target:
    - AppImage
  category: Development
npmRebuild: true
